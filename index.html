<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I love mero ✮⋆ for you 💖</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100vw;
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top left, #ff7ecf 0%, #ff4a8f 35%, #8b3dff 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 1s ease;
      overflow: hidden;
      position: relative;
    }

    body::before, body::after {
      content: '💖';
      position: fixed;
      font-size: 3rem;
      opacity: 0.16;
      animation: float 4s ease-in-out infinite;
    }

    body::before {
      top: 8%;
      left: 8%;
    }

    body::after {
      bottom: 10%;
      right: 10%;
      animation-delay: 1.5s;
    }

    .card {
      width: min(90vw, 430px);
      padding: 28px 24px 24px;
      text-align: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(14px);
      border-radius: 24px;
      box-shadow: 0 18px 45px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .avatar-wrap {
      width: 125px;
      height: 125px;
      margin: 0 auto 16px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, #ffffff, #ffd4e8);
      box-shadow: 0 10px 24px rgba(0,0,0,0.25);
    }

    .avatar-wrap img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: block;
      object-fit: cover;
      object-position: center;
    }

    h2 {
      margin: 0 0 8px;
      font-size: 1.5rem;
    }

    #love-text {
      font-size: 1.1rem;
      min-height: 3rem;
      padding: 10px 6px 0;
      animation: fadeIn 1s ease-in-out;
      line-height: 1.7;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .button {
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      z-index: 10;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border: 1px solid rgba(255, 255, 255, 0.35);
    }

    .button:hover {
      transform: translateY(-2px);
      background: white;
      color: #ff4a8f;
    }

    #theme-btn {
      position: absolute;
      top: 14px;
      left: 14px;
      width: 40px;
      height: 40px;
      padding: 0;
      font-size: 1rem;
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    #theme-btn.active {
      background: #111;
      color: #ff6fa8;
      border-color: #ff6fa8;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.15);
    }

    #gift-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid white;
      background-color: white;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 0 2px rgba(255,255,255,0.25), 0 8px 18px rgba(0,0,0,0.22);
      padding: 0;
    }

    #gift-btn img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    #gift-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.3), 0 12px 24px rgba(0,0,0,0.24);
    }
  </style>
</head>
<body>
  <div class="card">
    <button id="theme-btn" class="button" title="تبديل الثيم">🌙</button>
    <a href="gift.html" id="gift-btn" title="الهدية">
      <img src="c6d7562f27365e70d8a2a8ec58a2a8b7.webp" alt="MERO">
    </a>

    <div class="avatar-wrap">
      <img src="c6d7562f27365e70d8a2a8ec58a2a8b7.webp" alt="MERO avatar">
    </div>

    <h2>أحبكِ يا ميرو 💕</h2>
    <div id="love-text">I love mero ✮⋆ for you 💖</div>
    <a href="gift.html" class="button" style="margin-top: 16px;">اذهب إلى الهدية 💌</a>
  </div>

  <script>
    const messages = [
      "I love mero ✮⋆ for you 💖",
      "أنتِ لو هتعطيني هديه فإنتِ هديتي الوحيدة 🥺",
      "أنتِ النور في حياتي يا ميرو 🌟",
      "كل لحظة معك هي سعادة 💌",
      "قلبي ملككِ إلى الأبد ❤️"
    ];

    let msgIndex = 0;
    const loveText = document.getElementById("love-text");
    const themeBtn = document.getElementById("theme-btn");

    setInterval(() => {
      msgIndex = (msgIndex + 1) % messages.length;
      loveText.textContent = messages[msgIndex];
    }, 5000);

    let isDark = false;
    themeBtn.addEventListener("click", () => {
      isDark = !isDark;
      document.body.style.background = isDark
        ? "linear-gradient(135deg, #0f0f1b 0%, #1e1b4b 50%, #111827 100%)"
        : "radial-gradient(circle at top left, #ff7ecf 0%, #ff4a8f 35%, #8b3dff 100%)";
      themeBtn.classList.toggle("active");
      themeBtn.textContent = isDark ? "☀️" : "🌙";
    });
  </script>
</body>
</html>
